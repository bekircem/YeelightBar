name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-26, macos-26-intel]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Toolchain
        run: xcodebuild -version

      - name: Validate metadata
        run: bash Scripts/validate-plists.sh

      - name: Scan committed source for secrets
        run: bash Scripts/check-secrets.sh

      - name: Test notarization workflow scripts
        run: |
          bash -n Scripts/notarization-metadata.sh Scripts/wait-for-notarization.sh Scripts/test-notarization-workflow.sh
          bash Scripts/test-notarization-workflow.sh

      - name: Debug tests with complete concurrency checking
        run: >-
          xcodebuild test
          -project YeelightBar.xcodeproj
          -scheme YeelightBar
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/DerivedData"
          CODE_SIGNING_ALLOWED=NO
          SWIFT_STRICT_CONCURRENCY=complete

      - name: Release build
        run: >-
          xcodebuild build
          -project YeelightBar.xcodeproj
          -scheme YeelightBar
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/ReleaseDerivedData"
          CODE_SIGNING_ALLOWED=NO
          SWIFT_STRICT_CONCURRENCY=complete

      - name: Static analyzer
        run: >-
          xcodebuild analyze
          -project YeelightBar.xcodeproj
          -scheme YeelightBar
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/AnalyzeDerivedData"
          CODE_SIGNING_ALLOWED=NO
          SWIFT_STRICT_CONCURRENCY=complete

      - name: Thread Sanitizer network stress suite
        if: matrix.runner == 'macos-26'
        run: >-
          xcodebuild test
          -project YeelightBar.xcodeproj
          -scheme YeelightBar
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/TSanDerivedData"
          -enableThreadSanitizer YES
          -only-testing:YeelightBarTests/FakeYeelightIntegrationTests
          CODE_SIGNING_ALLOWED=NO
          SWIFT_STRICT_CONCURRENCY=complete
