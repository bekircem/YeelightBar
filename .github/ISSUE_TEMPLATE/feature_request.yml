name: Feature request
description: Suggest a focused improvement to YeelightBar.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What would this improve for users?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful solution and how it should behave on macOS.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional workarounds or designs you considered.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request can work without a YeelightBar cloud service or analytics.
          required: true
