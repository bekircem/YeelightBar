name: Bug report
description: Report a reproducible problem with YeelightBar.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve YeelightBar. Remove IP addresses, device IDs, device names, exported preferences, and signing information before submitting.
  - type: input
    id: version
    attributes:
      label: YeelightBar version
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Homebrew
        - GitHub DMG
        - Xcode / source build
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and architecture
      placeholder: macOS 15.5, Apple Silicon
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open…
        2. Select…
        3. Observe…
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Optional. Review and redact copied diagnostics before posting.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed device names, identifiers, IP addresses, preference exports, and credentials.
          required: true
